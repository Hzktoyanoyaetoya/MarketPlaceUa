<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPlaceUA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f9; color: #333; }
        .form-card, .product-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0088cc; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #006699; }
        .products-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .price { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

    <h2>📦 Додати оголошення</h2>
    <div class="form-card">
        <input type="text" id="title" placeholder="Назва товару" required>
        <input type="number" id="price" placeholder="Ціна (грн)" required>
        <textarea id="description" placeholder="Опис товару..."></textarea>
        <button onclick="publishProduct()">Опублікувати</button>
    </div>

    <h2>🛒 Схвалені товари</h2>
    <div id="products-container" class="products-list">
        <!-- Сюди виводитимуться тільки схвалені товари -->
    </div>

    <!-- Firebase SDK (Compat версія для зручності) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // -------------------------------------------------------------
        # НАЛАШТУВАННЯ (ЗАМІНИ НА СВОЇ ДАНІ)
        // -------------------------------------------------------------
        const BOT_TOKEN = "ТВІЙ_ТОКЕН_ВІД_BOTFATHER";
        const ADMIN_CHAT_ID = "ТВІЙ_CHAT_ID_З_USERINFOBOT"; // число, напр. 123456789

        const firebaseConfig = {
            databaseURL: "https://marketplaceua-2af8f-default-rtdb.europe-west1.firebasedatabase.app"
        };
        // -------------------------------------------------------------

        // Ініціалізація Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Відправка повідомлення модератору в Telegram
        async function sendToModerationBot(productId, productData) {
            const text = `<b>🆕 Нове оголошення на модерацію!</b>\n\n` +
                         `<b>Назва:</b> ${productData.title}\n` +
                         `<b>Ціна:</b> ${productData.price} грн\n` +
                         `<b>Опис:</b> ${productData.description || 'Без опису'}`;

            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "✅ Схвалити", callback_data: `approve_${productId}` },
                        { text: "❌ Відхилити", callback_data: `reject_${productId}` }
                    ]
                ]
            };

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: text,
                    parse_mode: 'HTML',
                    reply_markup: keyboard
                })
            });
        }

        // 2. Публікація нового товару
        function publishProduct() {
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const description = document.getElementById('description').value;

            if (!title || !price) {
                alert("Заповніть назву та ціну!");
                return;
            }

            const newProductRef = db.ref('products').push();
            const productId = newProductRef.key;

            const productData = {
                title: title,
                price: price,
                description: description,
                status: 'pending', // Статус за замовчуванням
                createdAt: Date.now()
            };

            // Зберігаємо в Firebase та надсилаємо модератору
            newProductRef.set(productData).then(() => {
                sendToModerationBot(productId, productData);
                alert("Оголошення відправлено на модерацію!");
                
                // Очищаємо форму
                document.getElementById('title').value = '';
                document.getElementById('price').value = '';
                document.getElementById('description').value = '';
            });
        }

        // 3. Завантаження тільки СХВАЛЕНИХ товарів на сайт
        db.ref('products').on('value', (snapshot) => {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            snapshot.forEach((childSnapshot) => {
                const product = childSnapshot.val();
                
                // Показуємо тільки якщо статус 'approved'
                if (product.status === 'approved') {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <h3>${product.title}</h3>
                        <p class="price">${product.price} грн</p>
                        <p>${product.description || ''}</p>
                    `;
                    container.appendChild(card);
                }
            });
        });
    </script>
</body>
</html>
