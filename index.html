<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarketPlaceUA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#0b0d14] text-white font-sans antialiased pb-28 selection:bg-blue-500/30">

    <!-- ВЕРХНЯ ШАПКА -->
    <header class="flex justify-between items-center px-4 py-3 sticky top-0 bg-[#0b0d14]/90 backdrop-blur-md z-40 border-b border-[#1b1f2e]">
        <div class="text-xl font-black tracking-tight cursor-pointer" id="btn-logo">
            MarketPlace<span class="text-[#2563eb]">U</span><span class="text-[#eab308]">A</span>
        </div>
    </header>

    <!-- ==================== ЕКРАН 1: ГОЛОВНА ==================== -->
    <div id="screen-main" class="tab-screen block">
        <div class="px-4 mt-4">
            <h2 class="text-base font-bold text-white tracking-wide mb-3">Схвалені оголошення</h2>
            <div class="grid grid-cols-2 gap-3" id="new-grid">
                <div class="col-span-2 text-center text-gray-500 py-6 text-xs">Завантаження...</div>
            </div>
        </div>
    </div>

    <!-- ==================== ЕКРАН 2: ДОДАТИ ТОВАР ==================== -->
    <div id="screen-add" class="tab-screen hidden p-4 max-w-md mx-auto">
        <h1 class="text-lg font-bold text-center mb-4">Нове оголошення</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-2">Фото товару</label>
                <input id="form-photos" type="file" accept="image/*" class="w-full text-xs text-gray-400 bg-[#151821] p-2 rounded-xl border border-[#222738]">
            </div>
            
            <input id="form-title" type="text" placeholder="Назва товару" class="w-full bg-[#151821] border border-[#222738] rounded-xl px-4 py-3 text-sm text-white focus:outline-none">
            
            <input id="form-price" type="number" placeholder="Ціна (грн)" class="w-full bg-[#151821] border border-[#222738] rounded-xl px-4 py-3 text-sm text-white focus:outline-none">
            
            <textarea id="form-description" rows="4" placeholder="Опис товару..." class="w-full bg-[#151821] border border-[#222738] rounded-xl px-4 py-3 text-sm text-white focus:outline-none resize-none"></textarea>
            
            <button id="btn-submit" class="w-full bg-[#2563eb] hover:bg-blue-600 py-3.5 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-transform">
                Надіслати на модерацію
            </button>
        </div>
    </div>

    <!-- НИЖНЯ НАВІГАЦІЯ -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#12141d]/95 backdrop-blur-lg border-t border-[#222738] flex justify-around items-center h-[72px] px-2 z-40">
        <button id="nav-main" class="nav-item flex flex-col items-center justify-center w-16 gap-1 text-[#2563eb]">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-medium">Головна</span>
        </button>
        
        <button id="nav-add" class="nav-item flex flex-col items-center justify-center w-16 relative">
            <div class="w-12 h-12 bg-[#2563eb] rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-blue-600/40 -mt-5 border-2 border-[#0b0d14]">+</div>
            <span class="text-[10px] font-medium text-gray-400 mt-0.5">Додати</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // //////////////////////////////////////////////////
        // ВСТАВИ СВІЙ ТОКЕН НИЖЧЕ Замість ТЕКСТУ:
        // //////////////////////////////////////////////////
        const BOT_TOKEN = "8884572139:AAGsO_k97c2oggnQypjCjX9P80nXmauFdac"; 
        const ADMIN_CHAT_ID = "1932772616"; 

        const firebaseConfig = {
            databaseURL: "https://marketplaceua-2af8f-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const currentUser = tg?.initDataUnsafe?.user?.username || "User_" + Math.floor(Math.random() * 899 + 100);
        let photoBase64 = "";

        // Навігація між вкладками
        document.getElementById('nav-main').addEventListener('click', () => {
            document.getElementById('screen-main').classList.remove('hidden');
            document.getElementById('screen-add').classList.add('hidden');
        });

        document.getElementById('nav-add').addEventListener('click', () => {
            document.getElementById('screen-add').classList.remove('hidden');
            document.getElementById('screen-main').classList.add('hidden');
        });

        // Обробка фото
        document.getElementById('form-photos').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (ev) => {
                    photoBase64 = ev.target.result;
                };
            }
        });

        // Натискання кнопки "Опублікувати"
        document.getElementById('btn-submit').addEventListener('click', async () => {
            const title = document.getElementById('form-title').value.trim();
            const price = document.getElementById('form-price').value.trim();
            const description = document.getElementById('form-description').value.trim();

            if (!title || !price) { 
                alert('Заповніть назву та ціну!'); 
                return; 
            }

            try {
                // 1. Запис у Firebase
                const newProdRef = push(ref(db, 'products'), {
                    title: title,
                    price: price,
                    description: description,
                    photo: photoBase64,
                    seller: currentUser,
                    status: 'pending',
                    timestamp: Date.now()
                });

                const productId = newProdRef.key;

                // 2. Відправка повідомлення в Telegram
                const msgText = `<b>🆕 Нове оголошення на модерацію!</b>\n\n` +
                                `<b>Назва:</b> ${title}\n` +
                                `<b>Ціна:</b> ${price} грн\n` +
                                `<b>Продавець:</b> @${currentUser}\n` +
                                `<b>Опис:</b> ${description || 'Без опису'}`;

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: msgText,
                        parse_mode: 'HTML',
                        reply_markup: {
                            inline_keyboard: [
                                [
                                    { text: '✅ Схвалити', callback_data: `approve_${productId}` },
                                    { text: '❌ Відхилити', callback_data: `reject_${productId}` }
                                ]
                            ]
                        }
                    })
                });

                alert('Оголошення відправлено на модерацію!');
                
                // Очищаємо форму
                document.getElementById('form-title').value = '';
                document.getElementById('form-price').value = '';
                document.getElementById('form-description').value = '';
                
                // Повертаємо на головну
                document.getElementById('nav-main').click();

            } catch (err) {
                console.error(err);
                alert('Сталася помилка при збереженні!');
            }
        });

        // Виведення схвалених товарів
        onValue(ref(db, 'products'), (snapshot) => {
            const grid = document.getElementById('new-grid');
            grid.innerHTML = '';
            const data = snapshot.val() || {};

            let count = 0;
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                if (item.status === 'approved') {
                    count++;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="bg-[#151821] rounded-2xl p-3 border border-[#222738]">
                            <div class="h-32 bg-[#1e2330] rounded-xl overflow-hidden mb-2 flex items-center justify-center">
                                ${item.photo ? `<img src="${item.photo}" class="w-full h-full object-cover">` : `<span class="text-2xl">📦</span>`}
                            </div>
                            <h3 class="text-xs font-bold text-white">${item.title}</h3>
                            <p class="text-sm font-bold text-blue-400 mt-1">${item.price} грн</p>
                        </div>
                    `);
                }
            });

            if (count === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center text-gray-500 py-6 text-xs">Немає схвалених оголошень</div>';
            }
        });
    </script>
</body>
</html>
